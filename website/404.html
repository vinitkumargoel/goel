<!DOCTYPE html>
<html lang="en" class="theme-terminal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Goel°</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#16181d">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
/* Hallmark · pre-emit critique: P4 H4 E4 S4 R5 V4 · 404, terminal theme */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow-x: clip; height: 100%; }
body { background: var(--color-paper); color: var(--color-ink); font-family: var(--font-body); display: grid; place-items: center; padding: 24px; }
::selection { background: var(--color-accent); color: var(--color-paper); }
main { text-align: center; max-width: 520px; }
.brand { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-weight: 600; letter-spacing: 0.18em; text-decoration: none; color: inherit; }
.brand img { width: 28px; height: 28px; border-radius: 7px; display: block; }
.brand .deg { color: var(--color-accent); margin-left: -0.34em; letter-spacing: 0; }
h1 { font-family: var(--font-display); font-weight: 600; font-size: clamp(3rem, 10vw, 5rem); letter-spacing: -0.02em; margin-top: var(--space-lg); }
.err { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-bad); margin-top: var(--space-xs); }
p { color: var(--color-ink-soft); margin-top: var(--space-md); line-height: 1.6; }
.btn {
  display: inline-flex; align-items: center; gap: 8px; margin-top: var(--space-lg);
  font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 500; text-decoration: none;
  background: var(--color-accent); color: var(--color-paper); border-radius: var(--radius-sm); padding: 10px 18px;
  transition: filter var(--dur-fast) var(--ease-out);
}
.btn:hover { filter: brightness(1.1); }
</style>
</head>
<body>
<main>
  <a class="brand" href="index.html"><img src="assets/goel-icon-128.png" alt="">GOEL<span class="deg">°</span></a>
  <h1>404</h1>
  <div class="err">✕ Failed — file not found on this server</div>
  <p>The page you asked for isn't in the queue. Retrying won't help — but the homepage is seeded and healthy.</p>
  <a class="btn" href="index.html">↻ Back to the homepage</a>
</main>
</body>
</html>
