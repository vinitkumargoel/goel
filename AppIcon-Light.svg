<?xml version="1.0" encoding="UTF-8"?>
<!-- GoelDownloader — app icon, LIGHT appearance.
     "Swarm" concept, Blue colorway: soft near-white radial with accent-blue peer
     rings, nodes and download core. 1024×1024 master; macOS squircle corner. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="GoelDownloader">
  <defs>
    <radialGradient id="bgLight" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0" stop-color="#f4f8ff"/>
      <stop offset="1" stop-color="#cfe1ff"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="230" fill="url(#bgLight)"/>

  <!-- concentric peer rings -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="#0a84ff" stroke-width="14" opacity="0.35"/>
  <circle cx="512" cy="512" r="220" fill="none" stroke="#0a84ff" stroke-width="16" opacity="0.50"/>

  <!-- swarm peer nodes -->
  <circle cx="512" cy="172" r="34" fill="#0a84ff" opacity="0.95"/>
  <circle cx="804" cy="392" r="30" fill="#0a84ff" opacity="0.70"/>
  <circle cx="700" cy="760" r="30" fill="#0a84ff" opacity="0.70"/>
  <circle cx="300" cy="724" r="28" fill="#0a84ff" opacity="0.60"/>
  <circle cx="232" cy="392" r="30" fill="#0a84ff" opacity="0.70"/>

  <!-- download core -->
  <path d="M512 376 L512 620 M512 624 L420 532 M512 624 L604 532"
        fill="none" stroke="#0a84ff" stroke-width="64" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
