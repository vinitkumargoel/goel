<?xml version="1.0" encoding="UTF-8"?>
<!-- GoelDownloader — app icon, LIGHT appearance.
     "Swarm" concept, Graphite colorway: dark-charcoal squircle (a touch lighter
     than the dark-mode variant) with a soft graphite glow, white peer rings,
     nodes and download core. The whole mark is inset to ~88% of the 1024 canvas
     so the tile reads a touch smaller than full-bleed; corners stay transparent. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="GoelDownloader">
  <defs>
    <radialGradient id="bgLight" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0" stop-color="#4a5059"/>
      <stop offset="1" stop-color="#20242b"/>
    </radialGradient>
  </defs>

  <!-- inset the entire mark to ~88% so the icon sits a little smaller in its tile -->
  <g transform="translate(512 512) scale(0.88) translate(-512 -512)">
    <rect width="1024" height="1024" rx="230" fill="url(#bgLight)"/>

    <!-- concentric peer rings -->
    <circle cx="512" cy="512" r="300" fill="none" stroke="#ffffff" stroke-width="14" opacity="0.24"/>
    <circle cx="512" cy="512" r="220" fill="none" stroke="#ffffff" stroke-width="16" opacity="0.42"/>

    <!-- swarm peer nodes -->
    <circle cx="512" cy="172" r="34" fill="#ffffff" opacity="0.75"/>
    <circle cx="804" cy="392" r="30" fill="#ffffff" opacity="0.60"/>
    <circle cx="700" cy="760" r="30" fill="#ffffff" opacity="0.60"/>
    <circle cx="300" cy="724" r="28" fill="#ffffff" opacity="0.55"/>
    <circle cx="232" cy="392" r="30" fill="#ffffff" opacity="0.60"/>

    <!-- download core -->
    <path d="M512 376 L512 620 M512 624 L420 532 M512 624 L604 532"
          fill="none" stroke="#ffffff" stroke-width="64" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
