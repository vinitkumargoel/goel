<?xml version="1.0" encoding="UTF-8"?>
<!-- Goel° — app icon ("Sky + goel°" colorway).
     The brand's monoline "g" monogram (circle bowl + hooked stem) and the raised
     accent dot, in white, on a light-blue gradient squircle. Authored in the
     brand's 48-unit space, scaled to 1024 and inset to 88% of the tile so the
     four corners stay transparent (matching the shipped icon's footprint).
     The same mark ships for both the light and dark appearance. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Goel">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5db4f5"/>
      <stop offset="1" stop-color="#2f83e6"/>
    </linearGradient>
  </defs>
  <g transform="translate(512 512) scale(0.88) translate(-512 -512)">
    <g transform="scale(21.3333)">
      <rect width="48" height="48" rx="10.8" fill="url(#sky)"/>
      <g stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="24" cy="21" r="8.5"/>
        <path d="M32.5 12.5 L32.5 32 Q32.5 36 27 36"/>
      </g>
      <circle cx="38.2" cy="11" r="3.1" fill="#ffffff"/>
    </g>
  </g>
</svg>
