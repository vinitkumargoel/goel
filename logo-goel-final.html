<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goel° — final app icon</title>
<style>
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#0b0f16;color:#e7eefb;padding:36px}
  h1{font-size:20px;font-weight:800;margin:0 0 4px}
  p{color:#8fa1bd;font-size:13px;margin:0 0 26px}
  .row{display:flex;gap:26px;align-items:flex-end;padding:22px 24px;border-radius:16px;margin-bottom:18px}
  .light{background:#eef1f6}.dark{background:#12161d;border:1px solid rgba(255,255,255,.07)}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .cell span{font-size:11px;color:#8fa1bd}
  .light .cell span{color:#5a6a82}
  svg{display:block;filter:drop-shadow(0 8px 16px rgba(0,0,0,.28))}
  .lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8fa1bd;width:70px}
  .light .lbl{color:#5a6a82}
</style></head><body>
<h1>Goel° · final app icon (Sky + goel°)</h1>
<p>Same mark ships for both appearances. Shown at Dock / Finder / menu-bar sizes on a light and a dark surface.</p>

<div class="row light"><span class="lbl">Light</span>
  <div class="cell"><svg id="s128a" width="128" height="128"></svg><span>128</span></div>
  <div class="cell"><svg id="s64a" width="64" height="64"></svg><span>64</span></div>
  <div class="cell"><svg id="s32a" width="32" height="32"></svg><span>32</span></div>
  <div class="cell"><svg id="s16a" width="16" height="16"></svg><span>16</span></div>
</div>
<div class="row dark"><span class="lbl">Dark</span>
  <div class="cell"><svg id="s128b" width="128" height="128"></svg><span>128</span></div>
  <div class="cell"><svg id="s64b" width="64" height="64"></svg><span>64</span></div>
  <div class="cell"><svg id="s32b" width="32" height="32"></svg><span>32</span></div>
  <div class="cell"><svg id="s16b" width="16" height="16"></svg><span>16</span></div>
</div>

<script>
  const inner = `
    <defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5db4f5"/><stop offset="1" stop-color="#2f83e6"/></linearGradient></defs>
    <g transform="translate(24 24) scale(0.94) translate(-24 -24)">
      <rect width="48" height="48" rx="10.8" fill="url(#sky)"/>
      <g stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="24" cy="21" r="8.5"/><path d="M32.5 12.5 L32.5 32 Q32.5 36 27 36"/></g>
      <circle cx="38.2" cy="11" r="3.1" fill="#fff"/></g>`;
  document.querySelectorAll('svg').forEach(s=>{ s.setAttribute('viewBox','0 0 48 48'); s.innerHTML=inner; });
</script></body></html>
